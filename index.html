          ctx.fillRect(pp.x - pp.sz / 2, pp.y - pp.sz / 2, pp.sz, pp.sz);
        }
        ctx.globalAlpha = 1;
      }

      // butonul final
      crateZones = { cont: imgButton('cont', cx - 90, Math.min(cy + cardH / 2 * scl + 16, H - 56), 180) };
    }
  }

  // panoul cu sanse, centrat sub masina (ca in mockup)
  function drawChancePanel(px, py2) {
    const pw = Math.min(250, W - px - 10), ph = 96;
    if (pw < 150 || py2 + ph > H - 8) return; // nu incape
    ctx.save();
    ctx.fillStyle = 'rgba(12,10,34,0.85)';
    roundRect(px, py2, pw, ph, 12); ctx.fill();
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff2d95';
    ctx.strokeStyle = 'rgba(255,45,149,0.6)'; ctx.lineWidth = 2;
    roundRect(px, py2, pw, ph, 12); ctx.stroke();
    ctx.restore();
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px Courier New';
    ctx.fillStyle = '#ff7ac0';
    ctx.fillText('CAPSULE ODDS', px + pw / 2, py2 + 20);
    const rows = [[2, '0.5%'], [1, '29.5%'], [0, '70%']];
    let ry = py2 + 42;
    for (const [ri, pct] of rows) {
      ctx.strokeStyle = RARITY[ri].color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(px + 20, ry - 4, 5, 0, Math.PI * 2); ctx.stroke();
      ctx.textAlign = 'left';
      ctx.font = '12px Courier New';
      ctx.fillStyle = '#aabbdd';
      ctx.fillText(RARITY[ri].name, px + 34, ry);
      ctx.textAlign = 'right';
      ctx.fillStyle = RARITY[ri].color;
      ctx.fillText(pct, px + pw - 16, ry);
      ry += 20;
    }
    ctx.textAlign = 'center';
  }

  // ---------- SELECTIE NIVELURI ----------
  function renderLvlSelect() {
    ctx.textAlign = 'center';
    const cx = W / 2;
    neonText('LEVELS', cx, 38, 22, '#ff8c00');
    ctx.font = '11px Courier New'; ctx.fillStyle = '#8899bb';
    ctx.fillText('same map on every try \u2022 collect coins to earn stars', cx, 58);

    const cols = 10, rows = 3;
    const cell = Math.min(52, Math.floor((W - 50) / cols) - 6);
    const gpx = 8, gpy = 24;
    const gw = cols * (cell + gpx) - gpx;
    const sx = cx - gw / 2;
    const sy = Math.max(78, H / 2 - (rows * (cell + gpy)) / 2 + 10);
    lvlZones = [];
    for (let i = 0; i < LVL_COUNT; i++) {
      const n = i + 1;
      const col = i % cols, row = Math.floor(i / cols);
      const x = sx + col * (cell + gpx), y = sy + row * (cell + gpy);
      const unlocked = n <= save.lvl.max;
      const stars = save.lvl.stars[n] || 0;
      ctx.fillStyle = unlocked ? 'rgba(8,10,30,0.85)' : 'rgba(8,10,30,0.5)';
      roundRect(x, y, cell, cell, 10); ctx.fill();
      ctx.strokeStyle = unlocked ? (stars === 3 ? '#ffd700' : '#ff8c00') : 'rgba(120,130,160,0.3)';
      ctx.lineWidth = 2;
      roundRect(x, y, cell, cell, 10); ctx.stroke();
      ctx.font = 'bold ' + Math.floor(cell * 0.38) + 'px Courier New';
      ctx.fillStyle = unlocked ? '#ffffff' : 'rgba(120,130,160,0.5)';
      ctx.fillText(unlocked ? n : '\u{1F512}', x + cell/2, y + cell/2 + cell * 0.14);
      if (unlocked && stars > 0) {
        ctx.font = '11px Courier New';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('\u2605'.repeat(stars) + '\u2606'.repeat(3 - stars), x + cell/2, y + cell + 14);
      }
      lvlZones.push({ x, y, w: cell, h: cell + 16, n });
    }
    ctx.font = '11px Courier New'; ctx.fillStyle = '#667799';
    ctx.fillText('tap anywhere else to return to the menu', cx, H - 14);
  }

  // ---------- NIVEL COMPLET ----------
  function renderLvlDone() {
    ctx.textAlign = 'center';
    const cx = W / 2;
    neonText('LEVEL ' + lvlN + ' COMPLETE!', cx, 58, 26, '#ff8c00');

    // stele mari cu aparitie pe rand
    ctx.font = 'bold 44px Courier New';
    for (let i = 0; i < 3; i++) {
      const filled = i < lvlStars;
      const pulse = filled ? 1 + Math.sin(tNow * 4 + i) * 0.06 : 1;
      ctx.save();
      ctx.translate(cx + (i - 1) * 64, 108);
      ctx.scale(pulse, pulse);
      if (filled) { ctx.shadowBlur = 14; ctx.shadowColor = '#ffd700'; }
      ctx.fillStyle = filled ? '#ffd700' : 'rgba(120,130,160,0.35)';
      ctx.fillText(filled ? '\u2605' : '\u2606', 0, 14);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    ctx.font = '13px Courier New'; ctx.fillStyle = '#aabbdd';
    ctx.fillText('Score: ' + score() + '    Coins: ' + coinCount + '/' + lvlCoinsSpawned, cx, 152);

    let ty = 176;
    for (const t of lvlReward) { neonText('\u2713 ' + t, cx, ty, 13, '#ffd700'); ty += 20; }
    for (const t of missionToasts.slice(0, 2)) { neonText('\u2713 ' + t, cx, ty, 12, '#00ff9d'); ty += 20; }

    const bw2 = Math.min(150, W / 3 - 24), bg2 = 14;
    const bh2 = bw2 * imgRatio('retry');
    const by2 = Math.min(Math.max(ty + 10, H - 100), H - 58);
    lvlDoneZones = {};
    if (lvlN < LVL_COUNT) {
      lvlDoneZones.next   = button(cx - bw2 * 1.5 - bg2, by2, bw2, bh2, 'NEXT', '#ff8c00', 13);
      lvlDoneZones.replay = imgButton('retry', cx - bw2 / 2, by2, bw2);
      lvlDoneZones.menu   = imgButton('back', cx + bw2 / 2 + bg2, by2, bw2);
    } else {
      lvlDoneZones.replay = imgButton('retry', cx - bw2 - bg2 / 2, by2, bw2);
      lvlDoneZones.menu   = imgButton('back', cx + bg2 / 2, by2, bw2);
    }
  }

  // ---------- LOOP ----------
  let last = performance.now();
  function loop(now) {
    const dt = Math.min((now - last) / 1000, 0.033);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }
  reset('endless');
  loadSave();
  requestAnimationFrame(loop);
})();
</script>
