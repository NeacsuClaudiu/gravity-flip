  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function dateStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

  // deseneaza personajul centrat in (0,0) cu latura s; gd intoarce fata cand esti pe tavan
  function drawCharCentered(ch, s, gd) {

        ctx.fillStyle = '#3c4a5c';

        body('#ff9e3d');
        eyes('#1a1c2e', -5*u);
        ctx.fillStyle = '#ff5a8a'; ctx.beginPath();
        ctx.moveTo(0, 2*u); ctx.lineTo(-2.5*u, 5.5*u); ctx.lineTo(2.5*u, 5.5*u); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2*u;
        ctx.beginPath();

        ctx.moveTo(h, 4*u); ctx.lineTo(h+7*u, 2*u); ctx.moveTo(h, 8*u); ctx.lineTo(h+7*u, 8*u);

      case 'ninja':

        ctx.fillStyle = '#ff2d55'; ctx.fillRect(h-2*u, -9*u, 9*u, 3*u);
        break;
      case 'alien':

        ctx.fillStyle = '#0a0a14';

        ctx.beginPath(); ctx.ellipse(-h*0.32, -h*0.28, 3*u, 5*u, -0.4, 0, Math.PI*2); ctx.fill();

        for (let i = -h + 5*u; i < h; i += 5*u) {

        const dg = ctx.createLinearGradient(0, -h, 0, h);
        dg.addColorStop(0, '#43c95f'); dg.addColorStop(1, '#238a3f');
        ctx.fillStyle = dg; ctx.fillRect(-h, -h, s, s);
        ctx.fillStyle = '#ffcf00'; ctx.fillRect(-6*u, -4*u, 4*u, 5*u); ctx.fillRect(2*u, -4*u, 4*u, 5*u);

        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.2*u;
        ctx.beginPath();
        ctx.moveTo(0, -h); ctx.lineTo(0, h);
        ctx.moveTo(-h, -3*u); ctx.lineTo(h, -3*u);
        ctx.moveTo(0, -h); ctx.lineTo(-6*u, h); ctx.moveTo(0, -h); ctx.lineTo(6*u, h);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.beginPath(); ctx.moveTo(0, -h); ctx.lineTo(4*u, -3*u); ctx.lineTo(0, -3*u); ctx.closePath(); ctx.fill();

      case 'curcubeu': {
        const rg = ctx.createLinearGradient(-h, -h, h, h);

        ctx.fillStyle = '#141428'; ctx.fillRect(-5.5*u, -5.5*u, 2*u, 2*u); ctx.fillRect(4.5*u, -5.5*u, 2*u, 2*u);
        break;
      }
      default: // cub
        body(ch.trail(gd));
        eyes('#05060f', -7*u);
    }
    ctx.restore();
  }

  const soundOn = () => save.sound !== false;
  const hasStorage = typeof window.storage !== 'undefined';
  async function loadSave() {
    if (!hasStorage) return;
    try {
      const r = await window.storage.get('gravity-flip-save');
      if (r && r.value) {
        const s = JSON.parse(r.value);
        if (s && s.v === 2) { save = s; }
        else if (s && s.m) {
          // migrare de la v1 (skinuri-culori): pastram progresul, vechile skinuri devin refund
          const oldExtra = Array.isArray(s.unlocked) ? Math.max(0, s.unlocked.length - 1) : 0;
          save.best = s.best || 0;
          save.wallet = (s.wallet || 0) + oldExtra * 100;
          save.m = s.m;
        }
        if (!save.stats) save.stats = freshStats();
        if (!save.ach) save.ach = [];
        if (!save.lvl) save.lvl = { max: 1, stars: {} };
        best = save.best;
      }
    } catch (e) {}
  }
  async function persist() {
    if (!hasStorage) return;
    try { await window.storage.set('gravity-flip-save', JSON.stringify(save)); } catch (e) {}
  }

  // ---------- AUDIO ----------
  let AC = null;
  function initAudio() {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (AC && AC.state === 'suspended') AC.resume();
  }
  function tone(freq, dur, type, vol, slideTo) {
    if (!AC) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, AC.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(30, slideTo), AC.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.12, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  }
  function sfx(k) {
    if (!AC || !soundOn()) return;
    if (k === 'flip')       tone(gravDir === 1 ? 480 : 300, 0.1, 'square', 0.1, gravDir === 1 ? 300 : 520);
    else if (k === 'coin')  { tone(880, 0.07, 'square', 0.09); setTimeout(() => tone(1320, 0.09, 'square', 0.09), 55); }
    else if (k === 'rare')  { tone(1046, 0.09, 'triangle', 0.14); setTimeout(() => tone(1568, 0.1, 'triangle', 0.14), 75); setTimeout(() => tone(2093, 0.14, 'triangle', 0.14), 150); }
    else if (k === 'power') { tone(523, 0.09, 'sawtooth', 0.09); setTimeout(() => tone(784, 0.13, 'sawtooth', 0.09), 80); }
    else if (k === 'portal') tone(180, 0.5, 'sawtooth', 0.11, 900);
    else if (k === 'shield') tone(160, 0.2, 'square', 0.16, 90);
    else if (k === 'die')    tone(420, 0.45, 'sawtooth', 0.16, 60);
    else if (k === 'buy')   { tone(660, 0.08, 'triangle', 0.13); setTimeout(() => tone(880, 0.1, 'triangle', 0.13), 70); }
    else if (k === 'mission'){ tone(660, 0.1, 'triangle', 0.14); setTimeout(() => tone(990, 0.18, 'triangle', 0.14), 100); }
    else if (k === 'legend') { [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,0.22,'triangle',0.14),i*90)); }
    else if (k === 'deny')   tone(180, 0.15, 'square', 0.12, 120);
    else if (k === 'thud')   tone(95, 0.18, 'sine', 0.28, 55);
    else if (k === 'boom')  { tone(70, 0.5, 'sawtooth', 0.22, 30); setTimeout(() => tone(1400, 0.3, 'triangle', 0.1, 400), 60); }
  }

  // ---------- STATE ----------
  const S = { MENU: 0, PLAY: 1, DEAD: 2, ACH: 3, CRATE: 4, LVL: 5, LVLDONE: 6 };
  const LVL_COUNT = 30;
  const lvlLenM = n => 350 + n * 60; // lungimea nivelului in metri
  let state = S.MENU;
  let best = 0;
  let selChar = 0;
  let menuZones = null, deadZones = null, achZones = null, crateZones = null;
  let missionToasts = [];
  let achPage = 0;
  let crateResult = null;
  let crateAnimT = 0, crateFx = { grab: false, drop: false, open: false, reveal: false };
  let crateParts = null; // particulele exploziei
  const CRATE_T = 4.9; // durata animatiei claw machine (cu suspans pe piedestal)
  let mode = 'endless', lvlN = 1, lbTop = null, lbRank = 0;
  let lvlZones = null, lvlDoneZones = null;
  let lvlCoinsSpawned = 0, lvlStars = 0, lvlReward = [];

  let player, obstacles, coins, powerups, portals, particles, trail;
  let speed, dist, coinCount, coinPoints, gravDir, flips;
  let spawnTimer, portalTimer, shake, flashT, tNow = 0;
  let magnetT, slowmoT, shield, goldRushT, goldSpawnT, goldPhase, puBag = [];
  let combo, comboT;
  let effect, effectT;
  let runTime, runPower, runRare, runPortals, runPortalSurv;

  function reset(m, n) {
    mode = m || 'endless';
    if (n) lvlN = n;
    if (mode === 'daily') rng = mulberry32(strHash('gf-' + dateStr()));
    else if (mode === 'level') rng = mulberry32(strHash('gf-lvl-' + lvlN));
    else rng = null;
    player = { x: 90, y: 0, vy: 0, grounded: true, inv: 0 };
    obstacles = []; coins = []; powerups = []; portals = []; particles = []; trail = [];
    speed = TUNE.baseSpeed + (mode === 'level' ? lvlN * 8 : 0);
    lvlCoinsSpawned = 0;
    dist = 0; coinCount = 0; coinPoints = 0; flips = 0;
    gravDir = 1;
    spawnTimer = 1.2;
    portalTimer = rand(TUNE.portalEvery[0], TUNE.portalEvery[1]) * 0.6;
    shake = 0; flashT = 0;
    magnetT = 0; slowmoT = 0; shield = false; goldRushT = 0; goldSpawnT = 0; goldPhase = 0; puBag = [];
    combo = 1; comboT = 0;
    effect = null; effectT = 0;
    runTime = 0; runPower = 0; runRare = 0; runPortals = 0; runPortalSurv = false;
    lbTop = null; lbRank = 0;
    player.y = H - TUNE.floorH - TUNE.playerSize;
  }

  const rand = (a, b) => a + R() * (b - a);

  // ---------- INPUT ----------
  function doFlip() {
    gravDir *= -1;
    flips++;
    flashT = 0.18;
    player.grounded = false;
    player.vy = gravDir * TUNE.flipImpulse;
    sfx('flip');
    burst(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, trailColor(), 8);
  }

  function inZone(x, y, r) { return r && x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h; }

  function openCrate() {
    if (save.wallet < TUNE.crateCost) { sfx('deny'); return; }
    save.wallet -= TUNE.crateCost;
    save.stats.crates++;
    const roll = Math.random();
    const rarity = roll < 0.70 ? 0 : roll < 0.995 ? 1 : 2;
    const pool = CHARS.filter(c => c.rarity === rarity && inSeason(c));
    const ch = pool[Math.floor(Math.random() * pool.length)];
    const dupe = save.unlocked.includes(ch.id);
    let refund = 0;
    if (dupe) { refund = DUPE_REFUND[rarity]; save.wallet += refund; }
    else {
      save.unlocked.push(ch.id);
      save.skin = ch.id;                 // echipare automata
      selChar = CHARS.indexOf(ch);       // panoul din meniu sare pe personajul nou
    }
    const PAL = ['#ff2d95', '#00e5ff', '#7CFC00', '#ffd700', '#ff8c00', '#b026ff', '#4d9fff', '#00ff9d'];
    crateResult = { ch, dupe, refund, capCol: PAL[Math.floor(Math.random() * PAL.length)] };
    crateAnimT = 0;
    crateFx = { grab: false, drop: false, open: false, reveal: false };
    crateParts = null;
    state = S.CRATE;
    sfx('coin');
    checkAch();
    persist();
  }

  function menuTap(x, y) {
    if (!menuZones) return false;
    if (inZone(x, y, menuZones.left))  { selChar = (selChar + CHARS.length - 1) % CHARS.length; sfx('coin'); return true; }
    if (inZone(x, y, menuZones.right)) { selChar = (selChar + 1) % CHARS.length; sfx('coin'); return true; }
    if (inZone(x, y, menuZones.equip)) {
      const ch = CHARS[selChar];
      if (save.unlocked.includes(ch.id)) { save.skin = ch.id; persist(); sfx('buy'); }
      else sfx('deny');
      return true;
    }
    if (inZone(x, y, menuZones.crate)) { openCrate(); return true; }
    if (inZone(x, y, menuZones.daily)) { state = S.PLAY; reset('daily'); return true; }
    if (inZone(x, y, menuZones.levels)) { state = S.LVL; sfx('coin'); return true; }
    if (inZone(x, y, menuZones.ach))   { achPage = 0; state = S.ACH; sfx('coin'); return true; }
    if (inZone(x, y, menuZones.play))  { state = S.PLAY; reset('endless'); return true; }
    if (inZone(x, y, menuZones.sound)) { save.sound = !soundOn(); persist(); sfx('coin'); return true; }
    return false;
  }

  // fullscreen pe mobil + blocare landscape; Chrome acorda "user activation"
  // abia la pointerup/touchend, NU la pointerdown - de aceea cererea se face acolo
  function goFullscreen() {
    if (document.fullscreenElement || document.webkitFullscreenElement) return;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (!req) return;
    try {
      const p = req.call(el, { navigationUI: 'hide' });
      if (p && p.then) p.then(() => {
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
      }).catch(() => {});
    } catch (err) {}
  }
  window.addEventListener('pointerup', e => { if (e.pointerType === 'touch') goFullscreen(); });

  window.addEventListener('pointerdown', e => {
    e.preventDefault();
    initAudio();
    const x = rotated ? e.clientY : e.clientX;
    const y = rotated ? window.innerWidth - e.clientX : e.clientY;
    if (state === S.MENU) {
      if (menuTap(x, y)) return;
      state = S.PLAY; reset('endless'); return;
    }
    if (state === S.DEAD) {
      if (inZone(x, y, deadZones && deadZones.retry)) { state = S.PLAY; reset(mode); return; }
      if (inZone(x, y, deadZones && deadZones.menu))  { state = S.MENU; sfx('coin'); return; }
      return;
    }
    if (state === S.LVL) {
      if (lvlZones) for (const z of lvlZones) {
        if (inZone(x, y, z)) {
          if (z.n <= save.lvl.max) { state = S.PLAY; reset('level', z.n); }
          else sfx('deny');
          return;
        }
      }
      state = S.MENU; return;
    }
    if (state === S.LVLDONE) {
      if (inZone(x, y, lvlDoneZones && lvlDoneZones.next))   { state = S.PLAY; reset('level', lvlN + 1); return; }
      if (inZone(x, y, lvlDoneZones && lvlDoneZones.replay)) { state = S.PLAY; reset('level', lvlN); return; }
      if (inZone(x, y, lvlDoneZones && lvlDoneZones.menu))   { state = S.MENU; sfx('coin'); return; }
      return;
    }
    if (state === S.ACH) {
      if (inZone(x, y, achZones && achZones.prev)) { achPage = Math.max(0, achPage - 1); sfx('coin'); return; }
      if (inZone(x, y, achZones && achZones.next)) { achPage = Math.min(Math.ceil(ACH.length / 7) - 1, achPage + 1); sfx('coin'); return; }
      if (y > H - 100) return; // banda pager-ului: tap ratat langa sageti nu inchide ecranul
      state = S.MENU; return;
    }
    if (state === S.CRATE) {
      if (crateAnimT < CRATE_T) crateAnimT = CRATE_T; // skip animatia
      else state = S.MENU;
      return;
    }
    doFlip();
  }, { passive: false });

  window.addEventListener('keydown', e => {
    if (e.code !== 'Space') return;
    initAudio();
    if (state === S.MENU) { state = S.PLAY; reset('endless'); }
    else if (state === S.DEAD) { state = S.PLAY; reset(mode); }
    else if (state === S.PLAY) doFlip();
  });

  function trailColor() { return charById(save.skin).trail(gravDir); }

  // ---------- SPAWNING ----------
  // intoarce secunde EXTRA de pauza pana la urmatorul spawn (pentru obstacole lungi)
  function spawn() {
    const r = R();
    const px = W + 60;
    if (r < 0.34) {
      const onCeil = R() < 0.5;
      const n = 1 + Math.floor(R() * 3);
      for (let i = 0; i < n; i++)
        obstacles.push({ type: 'spike', x: px + i * TUNE.spikeW, ceil: onCeil });
      if (R() < 0.7) coinLine(px, !onCeil, n);
    } else if (r < 0.56) {
      // perete cu marimi variate: 3 grosimi + gaura intre 1.0x si 1.3x (niciodata mai mica)
      const gapTop = R() < 0.5;
      obstacles.push({ type: 'wall', x: px, gapTop, w: 20 + Math.floor(R() * 3) * 16, gapMul: 1 + R() * 0.3 });
      if (R() < 0.6) {
        coins.push({ x: px + 20, y: gapTop ? TUNE.floorH + 24 : H - TUNE.floorH - 24, taken: false, rare: false });
        lvlCoinsSpawned++;
      }
    } else if (r < 0.70) {
      obstacles.push({ type: 'spike', x: px, ceil: false });
      obstacles.push({ type: 'spike', x: px + 190 + speed * 0.25, ceil: true });
      coinLine(px + 80, true, 2);
    } else if (r < 0.78) {
      // zid inalt si lung, cu culoar in care trebuie sa te incadrezi
      const playH = H - 2 * TUNE.floorH;
      const len = 200 + Math.floor(R() * 3) * 60; // 200 / 260 / 320
      const zone = R();
      let gapH, gapY;
      if (zone < 0.35) {        // culoar lipit de tavan
        gapH = Math.min(180, playH - 90); gapY = TUNE.floorH;
      } else if (zone < 0.70) { // culoar lipit de podea
        gapH = Math.min(180, playH - 90); gapY = H - TUNE.floorH - Math.min(180, playH - 90);
      } else {                  // tunel prin mijloc (te "incadrezi" in el)
        gapH = Math.min(205, playH - 80); gapY = TUNE.floorH + (playH - Math.min(205, playH - 80)) / 2;
      }
      obstacles.push({ type: 'slab', x: px, len, gapY, gapH });
      // monede pe mijlocul culoarului, ca ghidaj
      const cy = gapY + gapH / 2;
      const nc = Math.floor(len / 60);
      for (let i = 0; i < nc; i++) coins.push({ x: px + 34 + i * 60, y: cy, taken: false, rare: false });
      lvlCoinsSpawned += nc;
      return (len + 160) / Math.max(260, speed);
    } else if (r < 0.85) {
      // bare laser sus + jos; treci prin golul din centru
      const playH = H - 2 * TUNE.floorH;
      const gap = Math.min(240 + R() * 60, playH - 60);
      const half = gap / 2, margin = 26;
      let cy = TUNE.floorH + half + margin + R() * Math.max(1, playH - gap - margin * 2);
      cy = Math.min(H - TUNE.floorH - half - margin, cy);
      obstacles.push({ type: 'laser', x: px, gap, cy });
      if (R() < 0.4) { coins.push({ x: px, y: cy, taken: false, rare: true }); lvlCoinsSpawned++; }
    } else if (r < 0.93) {
      coinLine(px, R() < 0.5, 4);
      if (R() < 0.35) {
        const onCeilSide = R() < 0.5;
        const y = onCeilSide ? TUNE.floorH + 22 : H - TUNE.floorH - 22;
        coins.push({ x: px + 4 * 42 + 30, y, taken: false, rare: true });
        lvlCoinsSpawned++;
      }
    } else {
      // "shuffled bag": fiecare ciclu de 4 contine toate powerup-urile o singura data,
      // in ordine aleatorie -> exact 25% fiecare, fara acelasi powerup de 2+ ori la rand
      if (!puBag.length) {
        puBag = ['magnet', 'shield', 'slowmo', 'gold'];
        for (let i = puBag.length - 1; i > 0; i--) {
          const j = Math.floor(R() * (i + 1));
          const t = puBag[i]; puBag[i] = puBag[j]; puBag[j] = t;
        }
      }
      powerups.push({ x: px, y: H / 2 + rand(-50, 50), kind: puBag.pop(), taken: false });
    }
    return 0;
  }

  function coinLine(x, onCeilSide, n) {
    const y = onCeilSide ? TUNE.floorH + 22 : H - TUNE.floorH - 22;
    for (let i = 0; i < n; i++) coins.push({ x: x + i * 42, y, taken: false, rare: false });
    lvlCoinsSpawned += n;
  }

  function spawnPortal() {
    portals.push({ x: W + 80, y: H / 2 + rand(-50, 50), used: false, a: 0 });
  }

  // ---------- PARTICLES ----------
  function burst(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 240;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 0.5 + Math.random() * 0.4, max: 0.9, color });
    }
  }

  // ---------- PORTAL EFFECTS ----------
  const EFFECTS = [
    { id: 'grav2',  name: '2X GRAVITY',      color: '#ff8c00' },
    { id: 'turbo',  name: 'TURBO!',          color: '#ff2d55' },
    { id: 'rotate', name: 'UPSIDE DOWN',     color: '#b026ff' },
    { id: 'mirror', name: 'MIRRORED SCREEN', color: '#00ff9d' },
  ];

  function triggerPortal() {
    const e = EFFECTS[Math.floor(R() * EFFECTS.length)];
    effect = e.id; effectT = TUNE.portalDur;
    shake = 10; flashT = 0.3;
    runPortals++;
    sfx('portal');
    burst(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, e.color, 24);
  }

  function effectName() { const e = EFFECTS.find(x => x.id === effect); return e ? e.name : ''; }
  function effectColor() { const e = EFFECTS.find(x => x.id === effect); return e ? e.color : '#fff'; }

  // ---------- CLASAMENT ZILNIC (shared storage) ----------
  async function submitDaily(scoreV) {
    if (!hasStorage) { lbTop = 'off'; return; }
    const key = 'gf-lb-' + dateStr();
    let arr = [];
    try {
      const r = await window.storage.get(key, true);
      if (r && r.value) arr = JSON.parse(r.value);
    } catch (e) {}
    if (!Array.isArray(arr)) arr = [];
    const me = arr.find(en => en.n === save.name);
    if (me) me.s = Math.max(me.s, scoreV);
    else arr.push({ n: save.name, s: scoreV });
    arr.sort((a, b) => b.s - a.s);
    arr = arr.slice(0, 20);
    try { await window.storage.set(key, JSON.stringify(arr), true); } catch (e) {}
    lbTop = arr.slice(0, 5);
    lbRank = arr.findIndex(en => en.n === save.name) + 1;
  }

  // ---------- UPDATE ----------
  function update(rdt) {
    tNow += rdt;
    if (state === S.CRATE) {
      crateAnimT += rdt;
      if (!crateFx.grab && crateAnimT >= 1.1)  { crateFx.grab = true; sfx('shield'); }
      if (!crateFx.drop && crateAnimT >= 2.9)  { crateFx.drop = true; sfx('thud'); }
      if (!crateFx.open && crateAnimT >= 4.15) { crateFx.open = true; sfx('power'); }
      if (!crateFx.reveal && crateAnimT >= CRATE_T) {
        crateFx.reveal = true;
        sfx('boom');
        setTimeout(() => sfx(crateResult && crateResult.ch.rarity === 2 ? 'legend' : 'buy'), 250);
        // explozie de particule (glow, sparks, confetti)
        crateParts = [];
        const cols = ['#ffd700', '#ff8c00', '#ffffff', crateResult ? RARITY[crateResult.ch.rarity].color : '#ffd700'];
        for (let i = 0; i < 54; i++) {
          const a = Math.random() * Math.PI * 2, sp = 120 + Math.random() * 380;
          crateParts.push({ x: W / 2, y: H / 2 + 26, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 120,
            life: 0.6 + Math.random() * 0.7, max: 1.3, col: cols[i % cols.length], sz: 3 + Math.random() * 4 });
        }
      }
      if (crateParts) {
        for (const pp of crateParts) { pp.x += pp.vx * rdt; pp.y += pp.vy * rdt; pp.vy += 360 * rdt; pp.life -= rdt; }
        crateParts = crateParts.filter(pp => pp.life > 0);
      }
    }
    if (state !== S.PLAY) return;

    runTime += rdt;
    const dt = slowmoT > 0 ? rdt * TUNE.slowmoFactor : rdt;
    const speedMul = effect === 'turbo' ? 1.35 : 1;
    const gravMul = effect === 'grav2' ? 2 : 1;

    speed = Math.min(TUNE.maxSpeed, speed + TUNE.speedRamp * dt);
    const ws = speed * speedMul;
    dist += ws * dt;

    const lvlPx = mode === 'level' ? lvlLenM(lvlN) * 10 : Infinity;
    if (mode === 'level' && dist >= lvlPx) return levelComplete();

    player.vy += TUNE.gravity * gravMul * gravDir * dt;
    player.y += player.vy * dt;
    if (player.inv > 0) player.inv -= rdt;

    const floorY = H - TUNE.floorH - TUNE.playerSize;
    const ceilY = TUNE.floorH;
    if (player.y >= floorY) { player.y = floorY; player.vy = 0; if (!player.grounded && gravDir === 1) landFx(); player.grounded = true; }
    else if (player.y <= ceilY) { player.y = ceilY; player.vy = 0; if (!player.grounded && gravDir === -1) landFx(); player.grounded = true; }
    else player.grounded = false;

    trail.push({ x: player.x + TUNE.playerSize/2, y: player.y + TUNE.playerSize/2, life: 0.35 });
    for (const t of trail) t.life -= rdt;
    trail = trail.filter(t => t.life > 0);

    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      let extra = 0;
      if (mode !== 'level' || lvlPx - dist > 650) extra = spawn() || 0; // zona libera inainte de finish
      spawnTimer = TUNE.minGapTime + 160 / ws + R() * 0.32 + extra;
    }

    portalTimer -= dt;
    if (portalTimer <= 0) {
      spawnPortal();
      portalTimer = rand(TUNE.portalEvery[0], TUNE.portalEvery[1]);
    }

    for (const o of obstacles) o.x -= ws * dt;
    for (const c of coins) c.x -= ws * dt;
    for (const p of powerups) p.x -= ws * dt;
    for (const p of portals) { p.x -= ws * dt; p.a += rdt * 4; }
    obstacles = obstacles.filter(o => o.x + (o.len || 0) > -120);
    coins = coins.filter(c => c.x > -40 && !c.taken);
    powerups = powerups.filter(p => p.x > -40 && !p.taken);
    portals = portals.filter(p => p.x > -80 && !p.used);

    if (magnetT > 0) {
      magnetT -= rdt;
      const mcx = player.x + TUNE.playerSize/2, mcy = player.y + TUNE.playerSize/2;
      for (const c of coins) {
        const dx = mcx - c.x, dy = mcy - c.y;
        const d = Math.hypot(dx, dy);
        if (d < TUNE.magnetRange && d > 1) {
          const pull = 900 * (1 - d / TUNE.magnetRange);
          c.x += (dx / d) * pull * rdt;
          c.y += (dy / d) * pull * rdt;
        }
      }
    }
    if (slowmoT > 0) slowmoT -= rdt;
    if (goldRushT > 0) {
      // GOLD RUSH: valuri dese de banuti (bonus - nu intra in totalul pentru stele)
      goldRushT -= rdt;
      goldSpawnT -= dt;
      if (goldSpawnT <= 0) {
        // panglica ordonata: un val sinusoidal continuu de banuti
        goldSpawnT = 0.11;
        goldPhase += 0.55;
        const amp = Math.min(H / 2 - TUNE.floorH - 60, 150);
        coins.push({ x: W + 40, y: H / 2 + Math.sin(goldPhase) * amp, taken: false, rare: false });
      }
    }
    if (effectT > 0) {
      effectT -= rdt;
      if (effectT <= 0) {
        // mic slow-motion cand ecranul revine din oglinda, sa ai timp de reactie
        if (effect === 'mirror') slowmoT = Math.max(slowmoT, 1.4);
        effect = null; runPortalSurv = true;
      }
    }
    if (comboT > 0) { comboT -= rdt; if (comboT <= 0) combo = 1; }

    const pbox = { x: player.x + 4, y: player.y + 4, w: TUNE.playerSize - 8, h: TUNE.playerSize - 8 };
    for (const o of obstacles) {
      let boxes;
      if (o.type === 'spike') {
        boxes = [o.ceil
          ? { x: o.x + 6, y: TUNE.floorH, w: TUNE.spikeW - 12, h: TUNE.spikeH - 6 }
          : { x: o.x + 6, y: H - TUNE.floorH - TUNE.spikeH + 6, w: TUNE.spikeW - 12, h: TUNE.spikeH - 6 }];
      } else if (o.type === 'wall') {
        const gapH = wallGapH(o), wallW = o.w || 26;
        // muchia dinspre gaura e "land": poti aluneca/ateriza pe ea fara sa mori
        if (o.gapTop) boxes = [{ x: o.x, y: TUNE.floorH + gapH, w: wallW, h: H - 2*TUNE.floorH - gapH, land: 'top' }];
        else boxes = [{ x: o.x, y: TUNE.floorH, w: wallW, h: H - 2*TUNE.floorH - gapH, land: 'bot' }];
      } else if (o.type === 'slab') {
        boxes = [];
        if (o.gapY - TUNE.floorH > 8) boxes.push({ x: o.x + 3, y: TUNE.floorH, w: o.len - 6, h: o.gapY - TUNE.floorH, land: 'bot' });
        const slabBotY = o.gapY + o.gapH;
        if (H - TUNE.floorH - slabBotY > 8) boxes.push({ x: o.x + 3, y: slabBotY, w: o.len - 6, h: H - TUNE.floorH - slabBotY, land: 'top' });
      } else { // laser
        const lHalf = o.gap / 2, lw = 12;
        boxes = [
          { x: o.x - lw/2 + 2, y: TUNE.floorH, w: lw - 4, h: o.cy - lHalf - TUNE.floorH },
          { x: o.x - lw/2 + 2, y: o.cy + lHalf, w: lw - 4, h: H - TUNE.floorH - (o.cy + lHalf) },
        ];
      }
      let hitObs = false;
      for (const b of boxes) {
        if (!hit(pbox, b)) continue;
        // pe muchia dinspre culoar poti ateriza/aluneca (mori doar lovind blocul lateral)
        if (b.land === 'top' && gravDir === 1 && player.vy >= 0) {
          const pen = (pbox.y + pbox.h) - b.y;
          const maxPen = Math.min(30, Math.max(18, player.vy * dt + 10));
          if (pen <= maxPen) {
            player.y = b.y - TUNE.playerSize + 4; player.vy = 0;
            if (pen > 3) landFx();
            player.grounded = true;
            pbox.y = player.y + 4;
            continue;
          }
        } else if (b.land === 'bot' && gravDir === -1 && player.vy <= 0) {
          const pen = (b.y + b.h) - pbox.y;
          const maxPen = Math.min(30, Math.max(18, -player.vy * dt + 10));
          if (pen <= maxPen) {
            player.y = b.y + b.h - 4; player.vy = 0;
            if (pen > 3) landFx();
            player.grounded = true;
            pbox.y = player.y + 4;
            continue;
          }
        }
        hitObs = true; break;
      }
      if (hitObs) {
        if (player.inv > 0) continue;
        if (shield) {
          shield = false;
          player.inv = 1.2;
          shake = 8; flashT = 0.2;
          sfx('shield');
          burst(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, '#00ff9d', 16);
          continue;
        }
        return die();
      }
    }

    const ccx = player.x + TUNE.playerSize/2, ccy = player.y + TUNE.playerSize/2;
    for (const c of coins) {
      const dx = c.x - ccx, dy = c.y - ccy;
      if (dx*dx + dy*dy < 34*34) {
        c.taken = true;
        coinCount++;
        if (c.rare) runRare++;
        const val = (c.rare ? 25 : 5) * combo;
        coinPoints += val;
        combo = Math.min(TUNE.comboMax, combo + 1);
        comboT = TUNE.comboWindow;
        sfx(c.rare ? 'rare' : 'coin');
        burst(c.x, c.y, c.rare ? '#00ffff' : '#ffd700', c.rare ? 12 : 5);
      }
    }

    for (const p of powerups) {
      const dx = p.x - ccx, dy = p.y - ccy;
      if (dx*dx + dy*dy < 40*40) {
        p.taken = true;
        runPower++;
        if (p.kind === 'magnet') magnetT = TUNE.magnetDur;
        else if (p.kind === 'shield') shield = true;
        else if (p.kind === 'slowmo') slowmoT = TUNE.slowmoDur;
        else if (p.kind === 'gold') { goldRushT = TUNE.goldDur; goldSpawnT = 0; }
        sfx('power');
        burst(p.x, p.y, puColor(p.kind), 12);
      }
    }

    for (const p of portals) {
      const dx = p.x - ccx, dy = p.y - ccy;
      if (dx*dx + dy*dy < 52*52) {
        p.used = true;
        triggerPortal();
      }
    }

    for (const pt of particles) { pt.x += pt.vx * rdt; pt.y += pt.vy * rdt; pt.life -= rdt; }
    particles = particles.filter(pt => pt.life > 0);

    if (shake > 0) shake -= rdt * 30;
    if (flashT > 0) flashT -= rdt;
  }

  function landFx() {
    burst(player.x + TUNE.playerSize/2, gravDir === 1 ? player.y + TUNE.playerSize : player.y, '#4466ff', 4);
  }

  function hit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function score() { return Math.floor(dist / 10) + coinPoints; }

  function checkAch() {
    for (const a of ACH) {
      if (save.ach.includes(a.id)) continue;
      let ok = false;
      try { ok = a.check(save.stats, save); } catch (e) {}
      if (ok) {
        save.ach.push(a.id);
        save.wallet += a.reward;
        missionToasts.push('\u{1F3C6} ' + a.name + '  +' + a.reward + ' \u{1F7E1}');
        sfx('mission');
      }
    }
  }

  function bankRun() {
    const s = score();
    const runM = Math.floor(dist / 10);
    if (s > best) best = s;
    save.best = Math.max(save.best, s);
    save.wallet += coinCount;

    save.m.dist.p += runM;
    save.m.coins.p += coinCount;
    save.m.flips.p += flips;

    const st = save.stats;
    st.runs++;
    st.totalDist += runM;
    st.totalCoins += coinCount;
    st.totalFlips += flips;
    st.rareCoins += runRare;
    st.powerups += runPower;
    st.portals += runPortals;
    st.bestScore = Math.max(st.bestScore, s);
    st.bestRunDist = Math.max(st.bestRunDist, runM);
    st.bestRunCoins = Math.max(st.bestRunCoins, coinCount);
    if (runPower === 0 && runM >= 2500) st.noPowerRun = true;
    if (flips === 0 && runM >= 300) st.noFlipRun = true;
    if (runTime < 3) st.earlyDeath = true;
    if (runRare >= 5) st.tripleRare = true;
    if (runPortalSurv) st.portalSurvived = true;
    if (mode === 'daily') st.dailyPlayed = true;

    missionToasts = [];
    for (const k of MKEYS) {
      const cfg = MISSIONS[k], m = save.m[k];
      while (m.t < cfg.tiers.length && m.p >= cfg.tiers[m.t]) {
        const rew = cfg.reward[m.t];
        save.wallet += rew;
        missionToasts.push(cfg.label(cfg.tiers[m.t]) + '  +' + rew + ' \u{1F7E1}');
        m.p -= cfg.tiers[m.t];
        m.t++;
        sfx('mission');
      }
    }
    checkAch();
  }

  function die() {
    state = S.DEAD;
    shake = 14;
    sfx('die');
    burst(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, '#ff2d55', 30);
    bankRun();
    if (mode === 'daily') submitDaily(score());
    persist();
  }

  function levelComplete() {
    state = S.LVLDONE;
    sfx('legend');
    bankRun();
    const ratio = lvlCoinsSpawned > 0 ? coinCount / lvlCoinsSpawned : 1;
    lvlStars = 1 + (ratio >= 0.5 ? 1 : 0) + (ratio >= 0.9 ? 1 : 0);
    const prev = save.lvl.stars[lvlN] || 0;
    lvlReward = [];
    if (prev === 0) {
      const r = 100 + lvlN * 15;
      save.wallet += r;
      lvlReward.push('Level clear  +' + r + ' \u{1F7E1}');
    }
    if (lvlStars > prev) {
      const r = 40 * (lvlStars - prev);
      save.wallet += r;
      lvlReward.push((lvlStars - prev) + ' new stars  +' + r + ' \u{1F7E1}');
    }
    save.lvl.stars[lvlN] = Math.max(prev, lvlStars);
    if (lvlN >= save.lvl.max && lvlN < LVL_COUNT) save.lvl.max = lvlN + 1;
    persist();
  }

  function puColor(kind) {
    return kind === 'magnet' ? '#ffd700' : kind === 'shield' ? '#00ff9d' : kind === 'gold' ? '#ffb300' : '#7db3ff';
  }

  // ---------- HELPERE DESEN ----------
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // schimba luminozitatea unui hex (+ deschide, - inchide)
  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amt, g = ((n >> 8) & 255) + amt, b = (n & 255) + amt;
    r = Math.max(0, Math.min(255, r)); g = Math.max(0, Math.min(255, g)); b = Math.max(0, Math.min(255, b));
    return '#' + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1);
  }

  // pixel-art spinning coin (smiley face + plain back), pre-rendered
  const COIN_PX = 15;
  function makeCoinSprite(withFace) {
    const c = document.createElement('canvas');
    c.width = COIN_PX; c.height = COIN_PX;
    const g = c.getContext('2d');
    const C = (COIN_PX - 1) / 2;
    for (let y = 0; y < COIN_PX; y++) {
      for (let x = 0; x < COIN_PX; x++) {
        const d = Math.hypot(x - C, y - C);
        if (d > 7.3) continue;
        let col = '#ffcf33';
        if (d > 6.1) col = '#9a5b00';
        else if (d > 5.0) col = '#e09600';
        else if (x - C + (y - C) < -4) col = '#ffef9e';
        g.fillStyle = col; g.fillRect(x, y, 1, 1);
      }
    }
    if (withFace) {
      g.fillStyle = '#8a4c00';
      g.fillRect(5, 5, 1, 2); g.fillRect(9, 5, 1, 2);
      g.fillRect(5, 9, 1, 1); g.fillRect(9, 9, 1, 1);
      g.fillRect(6, 10, 3, 1);
    }
    return c;
  }
  const coinFront = makeCoinSprite(true), coinBack = makeCoinSprite(false);

  function drawIcon(kind, x, y, s, col) {
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (kind === 'magnet') {
      ctx.strokeStyle = col; ctx.lineWidth = s * 0.26;
      ctx.beginPath();
      ctx.arc(x, y - s * 0.08, s * 0.42, Math.PI, 2 * Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x - s * 0.42, y - s * 0.08); ctx.lineTo(x - s * 0.42, y + s * 0.42);
      ctx.moveTo(x + s * 0.42, y - s * 0.08); ctx.lineTo(x + s * 0.42, y + s * 0.42);
      ctx.stroke();
      ctx.strokeStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(x - s * 0.42, y + s * 0.24); ctx.lineTo(x - s * 0.42, y + s * 0.42);
      ctx.moveTo(x + s * 0.42, y + s * 0.24); ctx.lineTo(x + s * 0.42, y + s * 0.42);
      ctx.stroke();
    } else if (kind === 'shield') {
      ctx.beginPath();
      ctx.moveTo(x, y - s * 0.52);
      ctx.lineTo(x + s * 0.42, y - s * 0.3);
      ctx.lineTo(x + s * 0.42, y + s * 0.05);
      ctx.quadraticCurveTo(x + s * 0.42, y + s * 0.38, x, y + s * 0.56);
      ctx.quadraticCurveTo(x - s * 0.42, y + s * 0.38, x - s * 0.42, y + s * 0.05);
      ctx.lineTo(x - s * 0.42, y - s * 0.3);
      ctx.closePath();
      ctx.fillStyle = col; ctx.globalAlpha = 0.25; ctx.fill(); ctx.globalAlpha = 1;
      ctx.strokeStyle = col; ctx.lineWidth = s * 0.13; ctx.stroke();
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = s * 0.13;
      ctx.beginPath();
      ctx.moveTo(x - s * 0.18, y); ctx.lineTo(x - s * 0.04, y + s * 0.16); ctx.lineTo(x + s * 0.22, y - s * 0.16);
      ctx.stroke();
    } else if (kind === 'gold') {
      // banut cu stralucire (gold rush)
      ctx.strokeStyle = col; ctx.lineWidth = s * 0.13;
      ctx.beginPath(); ctx.arc(x, y, s * 0.44, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(x, y, s * 0.19, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#ffffff'; ctx.lineWidth = s * 0.11;
      ctx.beginPath();
      ctx.moveTo(x + s * 0.3, y - s * 0.46); ctx.lineTo(x + s * 0.44, y - s * 0.32);
      ctx.moveTo(x + s * 0.44, y - s * 0.46); ctx.lineTo(x + s * 0.3, y - s * 0.32);
      ctx.stroke();
    } else {
      ctx.strokeStyle = col; ctx.lineWidth = s * 0.13;
      ctx.beginPath();
      ctx.arc(x, y, s * 0.48, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x, y - s * 0.3);
      ctx.moveTo(x, y); ctx.lineTo(x + s * 0.22, y + s * 0.08);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawPowerup(p) {
    const bob = Math.sin(tNow * 3 + p.x * 0.02) * 6;
    const y = p.y + bob;
    const col = puColor(p.kind);
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(p.x, y, 28, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = 'rgba(10,14,40,0.92)';
    ctx.beginPath(); ctx.arc(p.x, y, 19, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 2.5;
    for (let i = 0; i < 8; i++) {
      const a = tNow * 1.8 + i * Math.PI / 4;
      ctx.beginPath();
      ctx.arc(p.x, y, 24, a, a + 0.42);
      ctx.stroke();
    }
    drawIcon(p.kind, p.x, y, 22, col);
  }

  // glife decorative pe sinele de sus/jos
  function drawRailGlyph(type, x, y, col) {
    ctx.save();
    ctx.strokeStyle = col; ctx.lineWidth = 1.6; ctx.globalAlpha = 0.55; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    if (type === 0) {          // hexagon cu romb in centru
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 6 + i * Math.PI / 3;
        const hx = x + Math.cos(a) * 11, hy = y + Math.sin(a) * 11;
        if (i) ctx.lineTo(hx, hy); else ctx.moveTo(hx, hy);
      }
      ctx.closePath(); ctx.stroke();
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.moveTo(x, y - 4); ctx.lineTo(x + 4, y); ctx.lineTo(x, y + 4); ctx.lineTo(x - 4, y);
      ctx.closePath(); ctx.fill();
    } else if (type === 1) {   // chevron-uri <<<
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(x + i * 9 + 6, y - 6); ctx.lineTo(x + i * 9, y); ctx.lineTo(x + i * 9 + 6, y + 6);
        ctx.stroke();
      }
    } else {                   // panou hasurat
      roundRect(x - 16, y - 8, 32, 16, 3); ctx.stroke();
      ctx.beginPath();
      for (let i = 0; i < 3; i++) { ctx.moveTo(x - 10 + i * 9, y + 6); ctx.lineTo(x - 4 + i * 9, y - 6); }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawSpike(o) {
    // triunghi neon gol pe interior, cu glow
    ctx.save();
    ctx.beginPath();
    if (o.ceil) {
      ctx.moveTo(o.x + 2, TUNE.floorH);
      ctx.lineTo(o.x + TUNE.spikeW - 2, TUNE.floorH);
      ctx.lineTo(o.x + TUNE.spikeW/2, TUNE.floorH + TUNE.spikeH);
    } else {
      ctx.moveTo(o.x + 2, H - TUNE.floorH);
      ctx.lineTo(o.x + TUNE.spikeW - 2, H - TUNE.floorH);
      ctx.lineTo(o.x + TUNE.spikeW/2, H - TUNE.floorH - TUNE.spikeH);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,45,85,0.16)';
    ctx.fill();
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff2d55';
    ctx.strokeStyle = '#ff2d55'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.restore();
  }

  function drawWall(o) {
    const gapH = wallGapH(o), wallW = o.w || 26;
    const wy = o.gapTop ? TUNE.floorH + gapH : TUNE.floorH;
    const wh = H - 2 * TUNE.floorH - gapH;
    const col = '#b026ff';
    // panou de sticla cu rama neon si hasuri diagonale
    ctx.save();
    ctx.fillStyle = 'rgba(176,38,255,0.16)';
    roundRect(o.x - 2, wy + 2, wallW + 4, wh - 4, 6); ctx.fill();
    roundRect(o.x - 2, wy + 2, wallW + 4, wh - 4, 6); ctx.clip();
    ctx.strokeStyle = 'rgba(176,38,255,0.55)'; ctx.lineWidth = 5;
    ctx.beginPath();
    for (let yy = wy - 20; yy < wy + wh + 40; yy += 24) {
      ctx.moveTo(o.x - 8, yy);
      ctx.lineTo(o.x + wallW + 8, yy - (wallW + 16));
    }
    ctx.stroke();
    // placi orizontale (segmente), sa nu para gol
    ctx.strokeStyle = 'rgba(230,180,255,0.45)'; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let yy = wy + 36; yy < wy + wh - 14; yy += 46) { ctx.moveTo(o.x - 2, yy); ctx.lineTo(o.x + wallW + 2, yy); }
    ctx.stroke();
    // linie de energie pe mijloc + impuls care circula spre gaura
    const ex = o.x + wallW / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.30)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(ex, wy + 8); ctx.lineTo(ex, wy + wh - 8); ctx.stroke();
    const pu = (tNow * 0.7 + o.x * 0.013) % 1;
    const py = o.gapTop ? (wy + wh - 10) - (wh - 20) * pu : (wy + 10) + (wh - 20) * pu;
    ctx.shadowBlur = 8; ctx.shadowColor = col;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(ex, py, 2.6, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
    ctx.save();
    ctx.shadowBlur = 12; ctx.shadowColor = col;
    ctx.strokeStyle = col; ctx.lineWidth = 2.5;
    roundRect(o.x - 2, wy + 2, wallW + 4, wh - 4, 6); ctx.stroke();
    // capete luminoase
    ctx.fillStyle = col;
    roundRect(o.x - 2, wy + 2, wallW + 4, 10, 4); ctx.fill();
    roundRect(o.x - 2, wy + wh - 12, wallW + 4, 10, 4); ctx.fill();
    ctx.restore();
  }

  // zid lung cu culoar (tunel) - blocuri mov cu caramizi si muchie de avertizare
  function drawSlab(o) {
    const col = '#b026ff';
    const blocks = [];
    if (o.gapY - TUNE.floorH > 8) blocks.push({ by: TUNE.floorH - 2, bh: o.gapY - TUNE.floorH + 2, gapBot: true });
    const slabBotY = o.gapY + o.gapH;
    if (H - TUNE.floorH - slabBotY > 8) blocks.push({ by: slabBotY, bh: H - TUNE.floorH - slabBotY + 2, gapBot: false });
    for (const b of blocks) {
      ctx.save();
      ctx.fillStyle = 'rgba(176,38,255,0.14)';
      roundRect(o.x, b.by, o.len, b.bh, 8); ctx.fill();
      roundRect(o.x, b.by, o.len, b.bh, 8); ctx.clip();
      // grila de caramizi
      ctx.strokeStyle = 'rgba(176,38,255,0.4)'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let xx = o.x + 46; xx < o.x + o.len; xx += 46) { ctx.moveTo(xx, b.by); ctx.lineTo(xx, b.by + b.bh); }
      for (let yy = b.by + 30; yy < b.by + b.bh; yy += 30) { ctx.moveTo(o.x, yy); ctx.lineTo(o.x + o.len, yy); }
      ctx.stroke();
      // hasuri diagonale rare
      ctx.strokeStyle = 'rgba(230,180,255,0.20)'; ctx.lineWidth = 4;
      ctx.beginPath();
      for (let xx = o.x - b.bh; xx < o.x + o.len + b.bh; xx += 58) { ctx.moveTo(xx, b.by + b.bh + 6); ctx.lineTo(xx + b.bh + 12, b.by - 6); }
      ctx.stroke();
      ctx.restore();
      // rama neon + muchia dinspre culoar mai luminoasa
      ctx.save();
      ctx.shadowBlur = 12; ctx.shadowColor = col;
      ctx.strokeStyle = col; ctx.lineWidth = 2.5;
      roundRect(o.x, b.by, o.len, b.bh, 8); ctx.stroke();
      const edgeY = b.gapBot ? b.by + b.bh : b.by;
      ctx.strokeStyle = '#e6b4ff'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(o.x + 5, edgeY); ctx.lineTo(o.x + o.len - 5, edgeY); ctx.stroke();
      ctx.restore();
    }
  }

  // bare laser sus si jos, cu gol pe centru
  function drawLaser(o) {
    const lHalf = o.gap / 2;
    const topEnd = o.cy - lHalf, botStart = o.cy + lHalf;
    const pulse = 0.75 + 0.25 * Math.sin(tNow * 9 + o.x * 0.05);
    ctx.save();
    // razele (aura + miez + fir alb)
    ctx.shadowBlur = 16; ctx.shadowColor = '#ff2d55';
    ctx.globalAlpha = 0.30 * pulse;
    ctx.fillStyle = '#ff2d55';
    ctx.fillRect(o.x - 7, TUNE.floorH, 14, topEnd - TUNE.floorH);
    ctx.fillRect(o.x - 7, botStart, 14, H - TUNE.floorH - botStart);
    ctx.globalAlpha = 1;
    ctx.fillRect(o.x - 3, TUNE.floorH, 6, topEnd - TUNE.floorH);
    ctx.fillRect(o.x - 3, botStart, 6, H - TUNE.floorH - botStart);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(o.x - 1, TUNE.floorH, 2, topEnd - TUNE.floorH);
    ctx.fillRect(o.x - 1, botStart, 2, H - TUNE.floorH - botStart);
    ctx.shadowBlur = 0;
    // varfuri stralucitoare la capetele golului
    ctx.fillStyle = '#ffd0da';
    ctx.beginPath(); ctx.arc(o.x, topEnd, 4 * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x, botStart, 4 * pulse, 0, Math.PI * 2); ctx.fill();
    // emitatoare metalice pe tavan si podea
    ctx.fillStyle = '#2a2f4a';
    roundRect(o.x - 11, TUNE.floorH - 4, 22, 14, 4); ctx.fill();
    roundRect(o.x - 11, H - TUNE.floorH - 10, 22, 14, 4); ctx.fill();
    ctx.strokeStyle = '#8899bb'; ctx.lineWidth = 1.5;
    roundRect(o.x - 11, TUNE.floorH - 4, 22, 14, 4); ctx.stroke();
    roundRect(o.x - 11, H - TUNE.floorH - 10, 22, 14, 4); ctx.stroke();
    ctx.restore();
  }

  function neonText(txt, x, y, size, color) {
    ctx.font = 'bold ' + size + 'px Courier New';
    ctx.shadowBlur = 14; ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.fillText(txt, x, y);
    ctx.shadowBlur = 0;
  }

  // pack-style pixel button (matches the PackCyanBlue assets)
  function button(bx, by, bw, bh, label, col, size) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,229,255,0.8)';
    ctx.fillStyle = '#2fe2f1';
    roundRect(bx, by, bw, bh, 6); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#f4feff';
    roundRect(bx + 3, by + 3, bw - 6, bh - 6, 4); ctx.fill();
    ctx.strokeStyle = '#0f6273'; ctx.lineWidth = 2;
    roundRect(bx + 5, by + 5, bw - 10, bh - 10, 3); ctx.stroke();
    ctx.font = 'bold ' + (size || 15) + 'px Courier New';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0f6273';
    ctx.fillText(label, bx + bw / 2 + 1.5, by + bh / 2 + 6.5);
    ctx.fillStyle = '#12c3d7';
    ctx.fillText(label, bx + bw / 2, by + bh / 2 + 5);
    return { x: bx, y: by, w: bw, h: bh };
  }

  // buttons/icons drawn from the PackCyanBlue PNG assets
  const imgRatio = k => (IMG[k] && IMG[k].naturalWidth ? IMG[k].naturalHeight / IMG[k].naturalWidth : 0.25);
  function imgButton(key, bx, by, bw) {
    const im = IMG[key], bh = bw * imgRatio(key);
    if (im && im.complete && im.naturalWidth) ctx.drawImage(im, bx, by, bw, bh);
    return { x: bx, y: by, w: bw, h: bh };
  }
  function imgIcon(key, icx, icy, s) {
    const im = IMG[key];
    if (im && im.complete && im.naturalWidth) ctx.drawImage(im, icx - s / 2, icy - s / 2, s, s);
    return { x: icx - s / 2, y: icy - s / 2, w: s, h: s };
  }

  // ---------- RENDER ----------
  function render() {
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    if (rotated) { ctx.translate(window.innerWidth, 0); ctx.rotate(Math.PI / 2); }
    ctx.clearRect(0, 0, W, H);

    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0c1030'); g.addColorStop(0.5, '#05060f'); g.addColorStop(1, '#0c1030');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // puls lent (ritm)
    const bgPulse = 0.5 + 0.5 * Math.sin(tNow * 2.1);

    // stele parallax pe 2 straturi
    for (let layer = 0; layer < 2; layer++) {
      const spd = layer ? 42 : 18, sz = layer ? 2.5 : 1.5, n = layer ? 16 : 22;
      ctx.globalAlpha = layer ? 0.5 : 0.26;
      for (let i = 0; i < n; i++) {
        const x = ((i * 137 + tNow * spd * (0.4 + (i % 3) * 0.3)) % (W + 40)) - 20;
        const y = ((i * 89 + layer * 47) % H);
        ctx.fillStyle = (i + layer) % 2 ? '#00e5ff' : '#ff2d95';
        ctx.fillRect(W - x, y, sz, sz);
      }
    }
    ctx.globalAlpha = 1;

    // vigneta subtila cu puls (adancime)
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.28, W / 2, H / 2, Math.max(W, H) * 0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,' + (0.42 + bgPulse * 0.1).toFixed(3) + ')');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

    if (state === S.MENU)    { renderMenu(); return; }
    if (state === S.ACH)     { renderAch(); return; }
    if (state === S.CRATE)   { renderCrate(); return; }
    if (state === S.LVL)     { renderLvlSelect(); return; }
    if (state === S.LVLDONE) { renderLvlDone(); return; }

    ctx.save();

    if (effect === 'rotate') {
      ctx.translate(W/2, H/2); ctx.rotate(Math.PI); ctx.translate(-W/2, -H/2);
    } else if (effect === 'mirror') {
      ctx.translate(W, 0); ctx.scale(-1, 1);
    }

    if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

    if (flashT > 0) {
      ctx.globalAlpha = flashT * 1.5;
      ctx.fillStyle = effect ? effectColor() : trailColor();
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    if (slowmoT > 0) {
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#7db3ff';
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    const edgeColor = effect ? effectColor() : (gravDir === 1 ? '#00e5ff' : '#ff2d95');

    // grila subtila pe tot ecranul, defileaza cu distanta
    ctx.save();
    ctx.globalAlpha = 0.06; ctx.strokeStyle = edgeColor; ctx.lineWidth = 1;
    const fgs = 46, fgo = (dist * 0.4) % fgs;
    for (let gx = -fgo; gx < W; gx += fgs) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (let gy = 0; gy < H; gy += fgs) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
    ctx.restore();

    ctx.fillStyle = '#0d1030';
    ctx.fillRect(0, 0, W, TUNE.floorH);
    ctx.fillRect(0, H - TUNE.floorH, W, TUNE.floorH);
    // margine neon cu glow
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = edgeColor;
    ctx.globalAlpha = 0.35; ctx.fillStyle = edgeColor;
    ctx.fillRect(0, TUNE.floorH - 7, W, 11);
    ctx.fillRect(0, H - TUNE.floorH - 4, W, 11);
    ctx.globalAlpha = 1;
    ctx.fillRect(0, TUNE.floorH - 3, W, 3);
    ctx.fillRect(0, H - TUNE.floorH, W, 3);
    ctx.restore();
    // linia secundara exterioara a sinei
    ctx.globalAlpha = 0.45; ctx.strokeStyle = edgeColor; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, TUNE.floorH - 20); ctx.lineTo(W, TUNE.floorH - 20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, H - TUNE.floorH + 20); ctx.lineTo(W, H - TUNE.floorH + 20); ctx.stroke();
    ctx.globalAlpha = 1;
    // glife decorative pe sine (hexagon / chevron / panou hasurat), defileaza cu lumea
    const rscroll = dist * 0.5, rspace = 230;
    const rfirst = Math.floor(rscroll / rspace);
    for (let k = rfirst; k <= rfirst + Math.ceil(W / rspace) + 1; k++) {
      const gx = k * rspace - rscroll;
      drawRailGlyph(((k % 3) + 3) % 3, gx, TUNE.floorH - 21, edgeColor);
      drawRailGlyph(((k + 2) % 3 + 3) % 3, gx + 115, H - TUNE.floorH + 21, edgeColor);
    }

    for (const o of obstacles) {
      if (o.type === 'spike') drawSpike(o);
      else if (o.type === 'wall') drawWall(o);
      else if (o.type === 'slab') drawSlab(o);
      else drawLaser(o);
    }

    // linia de finish (mod niveluri)
    if (mode === 'level') {
      const fx = lvlLenM(lvlN) * 10 - dist + player.x;
      if (fx < W + 60) {
        const sq = 14;
        for (let col = 0; col < 2; col++) {
          for (let yy = TUNE.floorH; yy < H - TUNE.floorH; yy += sq) {
            ctx.fillStyle = ((Math.floor(yy / sq) + col) % 2 === 0) ? '#ffffff' : '#1a1c2e';
            ctx.fillRect(fx + col * sq, yy, sq, Math.min(sq, H - TUNE.floorH - yy));
          }
        }
      }
    }

    for (const p of portals) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.a);
      for (let i = 0; i < 6; i++) {
        ctx.rotate(Math.PI / 3);
        ctx.fillStyle = EFFECTS[i % EFFECTS.length].color;
        ctx.fillRect(34, -5, 14, 10);
      }
      ctx.restore();
      ctx.font = 'bold 12px Courier New';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('?', p.x, p.y + 4);
    }

    for (const c of coins) {
      const pulse = 1 + Math.sin(tNow * 6 + c.x * 0.05) * 0.12;
      if (c.rare) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(tNow * 2);
        ctx.fillStyle = '#00ffff';
        const s = 13 * pulse;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.moveTo(0, -s*1.6); ctx.lineTo(s*1.6, 0); ctx.lineTo(0, s*1.6); ctx.lineTo(-s*1.6, 0);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.moveTo(0, -s); ctx.lineTo(s, 0); ctx.lineTo(0, s); ctx.lineTo(-s, 0);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      } else {
        ctx.fillStyle = '#ffd700';
        ctx.globalAlpha = 0.28;
        ctx.beginPath();
        ctx.arc(c.x, c.y, TUNE.coinR * pulse * 1.7, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        // pixel-art coin with spin animation
        const spin = Math.cos(tNow * 6 + c.y * 0.35);
        const wq = Math.max(3, Math.round(Math.abs(spin) * COIN_PX));
        const sz = COIN_PX * 2, dw = wq * 2;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(spin >= 0 ? coinFront : coinBack, Math.round(c.x - dw / 2), Math.round(c.y - sz / 2), dw, sz);
        ctx.imageSmoothingEnabled = true;
      }
    }

    for (const p of powerups) drawPowerup(p);

    for (const t of trail) {
      ctx.globalAlpha = t.life * 1.6;
      ctx.fillStyle = trailColor();
      const s = 8 * t.life * 2.8;
      ctx.fillRect(t.x - s/2, t.y - s/2, s, s);
    }
    ctx.globalAlpha = 1;

    if (state !== S.DEAD) {
      const blink = player.inv > 0 && Math.sin(tNow * 24) > 0;
      if (!blink) {
        const squash = player.grounded ? 1 : 0.88;
        const pcx = player.x + TUNE.playerSize/2, pcy = player.y + TUNE.playerSize/2;
        ctx.save();
        ctx.translate(pcx, pcy);
        ctx.scale(1 / squash, squash);
        ctx.globalAlpha = 0.25;
        drawCharCentered(charById(save.skin), TUNE.playerSize * 1.34, gravDir); // aura in forma personajului
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 16; ctx.shadowColor = trailColor(); // glow neon pe personaj
        drawCharCentered(charById(save.skin), TUNE.playerSize, gravDir);
        ctx.shadowBlur = 0;
        ctx.restore();
      }
      if (shield) {
        ctx.strokeStyle = '#00ff9d'; ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, 26 + Math.sin(tNow * 5) * 2, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (magnetT > 0) {
        ctx.globalAlpha = 0.15 + Math.sin(tNow * 6) * 0.05;
        ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(player.x + TUNE.playerSize/2, player.y + TUNE.playerSize/2, TUNE.magnetRange, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    for (const pt of particles) {
      ctx.globalAlpha = pt.life / pt.max;
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x - 2, pt.y - 2, 4, 4);
    }
    ctx.globalAlpha = 1;

    ctx.restore();

    // ---------- HUD ----------
    ctx.textAlign = 'center';
    if (state === S.PLAY) {
      // HUD minimal pe UN rand, complet in banda de sus - nu acopera deloc zona de joc
      const scoreStr = score().toString();
      const infoStr = '\u{1F7E1} ' + coinCount + '  ' + Math.floor(dist / 10) + 'm';
      ctx.font = 'bold 19px Courier New';
      const swd = ctx.measureText(scoreStr).width;
      ctx.font = '12px Courier New';
      const iwd = ctx.measureText(infoStr).width;
      const tot = swd + 14 + iwd, hx0 = W / 2 - tot / 2;
      ctx.fillStyle = 'rgba(8,10,30,0.6)';
      roundRect(hx0 - 14, 5, tot + 28, 30, 15); ctx.fill();
      ctx.textAlign = 'left';
      ctx.font = 'bold 19px Courier New';
      ctx.shadowBlur = 10; ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(scoreStr, hx0, 27);
      ctx.shadowBlur = 0;
      ctx.font = '12px Courier New';
      ctx.fillStyle = '#8899bb';
      ctx.fillText(infoStr, hx0 + swd + 14, 26);
      ctx.textAlign = 'center';
      if (mode === 'daily') neonText('DAILY', W - 52, 27, 14, '#ffd700');
      else if (mode === 'level') {
        neonText('LEVEL ' + lvlN, W - 62, 27, 14, '#ff8c00');
        const frac = Math.min(1, dist / (lvlLenM(lvlN) * 10));
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        roundRect(W/2 - 75, 46, 150, 5, 2.5); ctx.fill();
        ctx.fillStyle = '#ff8c00';
        roundRect(W/2 - 75, 46, Math.max(4, 150 * frac), 5, 2.5); ctx.fill();
      }

      if (combo > 1) neonText('COMBO x' + combo, W/2, 66, 14, '#ffd700');

      if (effect) {
        const c = effectColor();
        neonText(effectName() + '  ' + Math.ceil(effectT) + 's', W/2, H - 18, 17, c);
      }

      let py = 36;
      const badge = (kind, col, frac) => {
        ctx.fillStyle = 'rgba(8,10,30,0.75)';
        roundRect(12, py - 16, 92, 30, 15); ctx.fill();
        drawIcon(kind, 29, py - 1, 16, col);
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        roundRect(46, py - 4, 50, 7, 3.5); ctx.fill();
        ctx.fillStyle = col;
        roundRect(46, py - 4, Math.max(4, 50 * frac), 7, 3.5); ctx.fill();
        py += 38;
      };
      if (magnetT > 0) badge('magnet', '#ffd700', magnetT / TUNE.magnetDur);
      if (slowmoT > 0) badge('slowmo', '#7db3ff', slowmoT / TUNE.slowmoDur);
      if (goldRushT > 0) badge('gold', '#ffb300', goldRushT / TUNE.goldDur);
      if (shield)      badge('shield', '#00ff9d', 1);
      ctx.textAlign = 'center';
    } else if (state === S.DEAD) {
      const cy = H / 2;
      const dtitle = mode === 'daily' ? 'DAILY - GAME OVER' : mode === 'level' ? 'LEVEL ' + lvlN + ' - FAILED' : 'GAME OVER';
      neonText(dtitle, W/2, 56, 28, '#ff2d55');
      neonText(score().toString(), W/2, 98, 36, '#ffffff');
      ctx.font = '13px Courier New'; ctx.fillStyle = '#aabbdd';
      ctx.fillText('Best: ' + best + '    \u{1F7E1} ' + coinCount + '    ' + Math.floor(dist/10) + 'm    ' + flips + ' flips', W/2, 122);

      let ty = 148;
      // clasament daily (ascuns complet cand nu e disponibil)
      if (mode === 'daily' && lbTop !== 'off') {
        ctx.font = 'bold 13px Courier New';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('DAILY LEADERBOARD', W/2, ty); ty += 20;
        ctx.font = '12px Courier New';
        if (!lbTop) { ctx.fillStyle = '#8899bb'; ctx.fillText('loading...', W/2, ty); ty += 18; }
        else {
          lbTop.forEach((en, i) => {
            ctx.fillStyle = en.n === save.name ? '#00e5ff' : '#aabbdd';
            ctx.fillText((i + 1) + '. ' + en.n + '  \u2014  ' + en.s, W/2, ty); ty += 17;
          });
          if (lbRank > 5) { ctx.fillStyle = '#00e5ff'; ctx.fillText('...' + lbRank + '. ' + save.name, W/2, ty); ty += 17; }
        }
        ty += 6;
      }
      for (const t of missionToasts.slice(0, 4)) {
        neonText('\u2713 ' + t, W/2, ty, 12, '#00ff9d');
        ty += 20;
      }
      if (missionToasts.length > 4) { ctx.font='11px Courier New'; ctx.fillStyle='#00ff9d'; ctx.fillText('+' + (missionToasts.length-4) + ' more rewards', W/2, ty); ty += 18; }

      const bw = 156, bgap = 18;
      const by = Math.min(Math.max(ty + 8, cy + 40), H - 58);
      deadZones = {
        retry: imgButton('retry', W/2 - bw - bgap/2, by, bw),
        menu:  imgButton('back', W/2 + bgap/2, by, bw),
      };
    }
  }

  // ---------- MENIU ----------
  function drawCharPanel(cx, sy, pw) {
    const ch = CHARS[selChar];
    const unlocked = save.unlocked.includes(ch.id);
    const equipped = save.skin === ch.id;
    const rar = RARITY[ch.rarity];
    const hw = pw / 2;

    ctx.fillStyle = 'rgba(8,10,30,0.6)';
    roundRect(cx - hw, sy - 52, pw, 168, 18); ctx.fill();

    ctx.textAlign = 'center';
    ctx.font = 'bold 11px Courier New';
    ctx.fillStyle = rar.color;
    ctx.fillText(rar.name + (ch.season ? ' \u2022 SEASONAL' : ''), cx, sy - 32);

    imgIcon('larrow', cx - hw + 24, sy + 8, 30);
    imgIcon('rarrow', cx + hw - 24, sy + 8, 30);

    ctx.save();
    ctx.translate(cx, sy + 6);
    if (unlocked) {
      drawCharCentered(ch, 52, 1);
    } else {
      ctx.globalAlpha = 0.35;
      drawCharCentered(ch, 52, 1);
      ctx.globalAlpha = 1;
      ctx.font = 'bold 30px Courier New';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('?', 0, 11);
    }
    ctx.restore();

    ctx.font = 'bold 15px Courier New';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(ch.name, cx, sy + 58);

    ctx.font = '11px Courier New';
    if (equipped) { ctx.fillStyle = '#00ff9d'; ctx.fillText('EQUIPPED', cx, sy + 80); }
    else if (unlocked) { ctx.fillStyle = '#00e5ff'; ctx.fillText('Tap to equip', cx, sy + 80); }
    else if (ch.season && !inSeason(ch)) { ctx.fillStyle = '#b026ff'; ctx.fillText('Month ' + ch.season + ' only \u2022 from crates', cx, sy + 80); }
    else { ctx.fillStyle = '#ffd700'; ctx.fillText('Found in crates', cx, sy + 80); }

    return {
      left:  { x: cx - hw, y: sy - 16, w: 48, h: 64 },
      right: { x: cx + hw - 48, y: sy - 16, w: 48, h: 64 },
      equip: { x: cx - 70,  y: sy - 30, w: 140, h: 122 }, // acopera si textul "Tap to equip"
    };
  }

  function drawMissions(mx, my, bw) {
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px Courier New';
    ctx.fillStyle = '#8899bb';
    ctx.fillText('MISSIONS', mx, my);
    my += 22;
    ctx.font = '11px Courier New';
    for (const k of MKEYS) {
      const cfg = MISSIONS[k], m = save.m[k];
      if (m.t >= cfg.tiers.length) {
        ctx.fillStyle = '#00ff9d';
        ctx.fillText('\u2713 ALL COMPLETE', mx, my);
      } else {
        const target = cfg.tiers[m.t];
        const frac = Math.min(1, m.p / target);
        ctx.fillStyle = '#aabbdd';
        ctx.textAlign = 'left';
        ctx.fillText(cfg.short(target), mx - bw/2, my);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('+' + cfg.reward[m.t], mx + bw/2, my);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        roundRect(mx - bw/2, my + 5, bw, 5, 2.5); ctx.fill();
        ctx.fillStyle = '#00e5ff';
        roundRect(mx - bw/2, my + 5, Math.max(3, bw * frac), 5, 2.5); ctx.fill();
      }
      my += 32;
    }
    return my;
  }

  function renderMenu() {
    ctx.textAlign = 'center';
    const cx = W / 2;
    const colW = W / 3; // trei coloane egale, garantat fara suprapunere

    neonText('GRAVITY FLIP', cx, 36, 24, '#00e5ff');
    ctx.font = 'bold 13px Courier New';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('\u{1F7E1} ' + save.wallet, cx - 70, 58);
    ctx.fillStyle = '#8899bb';
    ctx.fillText('BEST ' + best, cx + 70, 58);

    // coloana stanga: personaj
    const panelW = Math.min(250, colW - 16);
    const zones = drawCharPanel(colW * 0.5, Math.max(H * 0.5, 132), panelW);

    // coloana centru: misiuni
    const mbw = Math.min(220, colW - 36);
    drawMissions(colW * 1.5, Math.max(H * 0.26, 86), mbw);

    // coloana dreapta: butoane
    const bw = Math.min(200, colW - 20), bh = 36;
    const bx = colW * 2.5 - bw / 2;
    const bfont = bw < 170 ? 11 : 13;
    let by = Math.max(H * 0.18, 68);
    zones.levels = button(bx, by, bw, bh, 'LEVELS ' + (save.lvl.max - 1) + '/' + LVL_COUNT, '#ff8c00', bfont); by += 46;
    zones.crate = button(bx, by, bw, bh, 'BALL CLAW ' + TUNE.crateCost + ' \u{1F7E1}', '#ffd700', bfont); by += 46;
    zones.daily = button(bx, by, bw, bh, 'DAILY', '#b026ff', bfont); by += 46;
    zones.ach = button(bx, by, bw, bh, 'ACHIEVEMENTS ' + save.ach.length + '/' + ACH.length, '#00ff9d', bfont); by += 46;

    // PLAY button (PackCyanBlue) + sound toggle
    const pw2 = Math.min(200, colW - 16);
    zones.play = imgButton('play', colW * 1.5 - pw2 / 2, H - 16 - pw2 * imgRatio('play'), pw2);
    zones.sound = imgIcon(soundOn() ? 'sndon' : 'sndoff', W - 28, 28, 34);

    menuZones = zones;
  }

  // ---------- PAGINA REALIZARI ----------
  function renderAch() {
    ctx.textAlign = 'center';
    const cx = W / 2;
    const perPage = 7;
    const pages = Math.ceil(ACH.length / perPage);

    neonText('ACHIEVEMENTS  ' + save.ach.length + '/' + ACH.length, cx, 40, 22, '#00ff9d');

    let y = 74;
    ctx.font = '12px Courier New';
    const items = ACH.slice(achPage * perPage, achPage * perPage + perPage);
    for (const a of items) {
      const done = save.ach.includes(a.id);
      ctx.textAlign = 'left';
      ctx.fillStyle = done ? '#00ff9d' : '#667799';
      ctx.fillText((done ? '\u2713 ' : '\u25CB ') + a.name, cx - 220, y);
      ctx.textAlign = 'right';
      ctx.fillStyle = done ? '#00ff9d' : '#ffd700';
      ctx.fillText('+' + a.reward + ' \u{1F7E1}', cx + 220, y);
      y += 26;
    }

    ctx.textAlign = 'center';
    ctx.globalAlpha = achPage > 0 ? 1 : 0.3;
    imgIcon('larrow', cx - 120, H - 44, 48);
    ctx.globalAlpha = achPage < pages - 1 ? 1 : 0.3;
    imgIcon('rarrow', cx + 120, H - 44, 48);
    ctx.globalAlpha = 1;
    // zone de atingere mult mai mari decat iconitele (pentru telefon)
    achZones = {
      prev: { x: cx - 175, y: H - 96, w: 110, h: 96 },
      next: { x: cx + 65,  y: H - 96, w: 110, h: 96 },
    };
    ctx.font = '12px Courier New'; ctx.fillStyle = '#8899bb';
    ctx.fillText((achPage + 1) + '/' + pages, cx, H - 34);
    ctx.fillText('tap anywhere else to go back', cx, 60 + perPage * 26 + 14);
  }

  // ---------- REVEAL LADA (claw machine cu bile de sticla) ----------
  // bila de sticla neon; openAmt 0..1 = jumatatile se despart la reveal
  function drawCrateBox(x, y, sz, col, glow, openAmt) {
    openAmt = openAmt || 0;
    const r = sz / 2;
    const split = openAmt * r * 1.25;
    if (glow > 0) {
      ctx.globalAlpha = Math.min(0.85, glow);
      const gr = ctx.createRadialGradient(x, y, sz * 0.18, x, y, sz * 1.6);
      gr.addColorStop(0, 'rgba(255,230,150,0.9)');
      gr.addColorStop(1, 'rgba(255,150,0,0)');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(x, y, sz * 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    const rim = shade(col, -70);
    const halfBall = (top) => {
      ctx.save();
      ctx.translate(x, y + (top ? -split : split));
      ctx.beginPath();
      if (openAmt > 0.01) { ctx.arc(0, 0, r, top ? Math.PI : 0, top ? Math.PI * 2 : Math.PI); ctx.closePath(); }
      else ctx.arc(0, 0, r, 0, Math.PI * 2);
      const g = ctx.createRadialGradient(-r * 0.35, -r * 0.4, r * 0.1, 0, 0, r * 1.12);
      g.addColorStop(0, shade(col, 80));
      g.addColorStop(0.5, col);
      g.addColorStop(1, shade(col, -60));
      ctx.fillStyle = g;
      ctx.globalAlpha = 0.94;
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = rim; ctx.lineWidth = Math.max(1.5, sz * 0.05);
      ctx.stroke();
      ctx.restore();
    };
    if (openAmt > 0.01) { halfBall(false); halfBall(true); }
    else halfBall(true); // inchisa = o singura sfera intreaga
    // reflexii de sticla (sus)
    ctx.save();
    ctx.translate(x, y - split);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.8;
    ctx.beginPath(); ctx.ellipse(-r * 0.36, -r * 0.42, r * 0.2, r * 0.11, -0.6, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 0.35;
    ctx.beginPath(); ctx.ellipse(-r * 0.05, -r * 0.64, r * 0.1, r * 0.05, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // arc de reflexie jos
    ctx.save();
    ctx.translate(x, y + split);
    ctx.globalAlpha = 0.28; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = Math.max(1.2, sz * 0.045);
    ctx.beginPath(); ctx.arc(0, 0, r * 0.74, Math.PI * 0.28, Math.PI * 0.72); ctx.stroke();
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawClaw(cx, clawY, closed) {
    // lant cu zale
    ctx.strokeStyle = '#5a6580'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, clawY - 18); ctx.stroke();
    ctx.strokeStyle = '#8a93a6'; ctx.lineWidth = 2;
    for (let i = 6; i < clawY - 18; i += 12) { ctx.beginPath(); ctx.ellipse(cx, i, 3.5, 5.5, 0, 0, Math.PI * 2); ctx.stroke(); }
    // cap motor neon (violet) cu suruburi roz
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#b06cff';
    ctx.fillStyle = 'rgba(20,16,44,0.9)';
    roundRect(cx - 16, clawY - 22, 32, 18, 5); ctx.fill();
    ctx.strokeStyle = '#b06cff'; ctx.lineWidth = 2.5;
    roundRect(cx - 16, clawY - 22, 32, 18, 5); ctx.stroke();
    roundRect(cx - 7, clawY - 30, 14, 9, 3); ctx.stroke();
    ctx.fillStyle = '#ff2d95';
    ctx.beginPath();
    ctx.arc(cx - 8, clawY - 13, 2.2, 0, Math.PI * 2);
    ctx.arc(cx + 8, clawY - 13, 2.2, 0, Math.PI * 2);
    ctx.fill();
    // doua gheare curbate neon
    const spread = 24 - 12 * closed;
    ctx.lineCap = 'round'; ctx.lineWidth = 4;
    ctx.strokeStyle = '#b06cff';
    for (const sd of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(cx + sd * 9, clawY - 6);
      ctx.quadraticCurveTo(cx + sd * (spread + 12), clawY + 12, cx + sd * spread * 0.55, clawY + 32);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + sd * spread * 0.55, clawY + 32);
      ctx.lineTo(cx + sd * (spread * 0.55 - 5), clawY + 38 - 3 * closed);
      ctx.stroke();
    }
    ctx.restore();
  }

  // piedestal neon pentru prezentarea bilei (cadrul 6 din mockup)
  function drawPedestal(x, y, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.shadowBlur = 12; ctx.shadowColor = '#ff2d95';
    ctx.strokeStyle = '#ff2d95'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 36, y + 14);
    ctx.lineTo(x - 26, y);
    ctx.lineTo(x + 26, y);
    ctx.lineTo(x + 36, y + 14);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,45,149,0.15)';
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  // raze colorate + stelute in jurul bilei prezentate
  function drawSparks(x, y, a) {
    const cols = ['#00e5ff', '#ff2d95', '#ffd700'];
    ctx.save();
    ctx.globalAlpha = a;
    ctx.lineCap = 'round';
    for (let i = 0; i < 10; i++) {
      const ang = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const r1 = 28 + a * 8, r2 = r1 + 10 + (i % 2) * 9;
      ctx.strokeStyle = cols[i % 3]; ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ang) * r1, y + Math.sin(ang) * r1);
      ctx.lineTo(x + Math.cos(ang) * r2, y + Math.sin(ang) * r2);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffd700';
    for (const sp of [[-46, -30], [48, -22], [-38, 18], [42, 26]]) {
      const s = 3 + a * 2;
      ctx.save();
      ctx.translate(x + sp[0], y + sp[1]);
      ctx.rotate(tNow * 2);
      ctx.fillRect(-s / 2, -1, s, 2);
      ctx.fillRect(-1, -s / 2, 2, s);
      ctx.restore();
    }
    ctx.restore();
  }

  const easeIO = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  const lerp = (a, b, t) => a + (b - a) * t;

  function renderCrate() {
    if (!crateResult) { state = S.MENU; return; }
    const ch = crateResult.ch;
    const rar = RARITY[ch.rarity];
    const t = crateAnimT;
    const ccx = W / 2;

    if (t < CRATE_T) {
      // ---- masina (design neon "Capsule Claw") ----
      // panoul de sanse sta in dreapta daca are loc; altfel revine sub masina
      const sideRoom = W - (ccx + 198) - 10;
      // fara textul "tap to skip", masina coboara pana aproape de marginea de jos
      const pitY = sideRoom >= 150 ? H - 44 : Math.min(H / 2 + 60, H - 170);
      const topY = 64;
      // geometria sticlei; bilele se scaleaza dupa ea ca sa incapa pe orice ecran (telefon)
      const glassX = ccx - 162, glassY = 58, glassW = 324, glassH = pitY - 64;
      const boxS = Math.max(16, Math.min(24, glassH * 0.13));

      // rama exterioara roz cu glow
      ctx.save();
      ctx.shadowBlur = 18; ctx.shadowColor = '#ff2d95';
      ctx.strokeStyle = '#ff2d95'; ctx.lineWidth = 3;
      roundRect(ccx - 178, 24, 356, pitY, 18); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(10,12,30,0.55)';
      roundRect(ccx - 178, 24, 356, pitY, 18); ctx.fill();
      // sticla interioara cyan
      ctx.fillStyle = 'rgba(6,8,22,0.55)';
      roundRect(ccx - 162, 58, 324, pitY - 64, 12); ctx.fill();
      ctx.strokeStyle = 'rgba(0,229,255,0.5)'; ctx.lineWidth = 2;
      roundRect(ccx - 162, 58, 324, pitY - 64, 12); ctx.stroke();
      // slash-uri decorative pe muchia de sus (stanga)
      ctx.strokeStyle = '#00e5ff'; ctx.lineWidth = 3; ctx.lineCap = 'round';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(ccx - 150 + i * 13, 32);
        ctx.lineTo(ccx - 140 + i * 13, 16);
        ctx.stroke();
      }
      // sageti decorative pe stanga, in afara ramei
      ctx.strokeStyle = '#ff2d95'; ctx.lineWidth = 2; ctx.globalAlpha = 0.8; ctx.lineJoin = 'round';
      for (let i = 0; i < 3; i++) {
        const ay = 24 + pitY * 0.42 + i * 20;
        ctx.beginPath();
        ctx.moveTo(ccx - 196, ay); ctx.lineTo(ccx - 188, ay); ctx.lineTo(ccx - 192, ay + 7);
        ctx.closePath(); ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // titlu sus, centrat (cyan + roz)
      ctx.font = 'bold 19px Courier New';
      ctx.textAlign = 'left';
      const w1 = ctx.measureText('CAPSULE ').width;
      const w2 = ctx.measureText('CLAW').width;
      ctx.shadowBlur = 12; ctx.shadowColor = '#00e5ff';
      ctx.fillStyle = '#00e5ff';
      ctx.fillText('CAPSULE ', ccx - (w1 + w2) / 2, 51);
      ctx.shadowColor = '#ff2d95';
      ctx.fillStyle = '#ff2d95';
      ctx.fillText('CLAW', ccx - (w1 + w2) / 2 + w1, 51);
      ctx.shadowBlur = 0;
      ctx.textAlign = 'center';
      ctx.restore();
      // podeaua masinii
      ctx.fillStyle = '#141836';
      ctx.fillRect(ccx - 162, pitY + 2, 324, 12);

      // ---- gramada de bile de sticla (spate -> fata) ----
      const PAL2 = ['#ff2d7a', '#2f7bff', '#12d15e', '#ffb300', '#9d3cff', '#00cfe0', '#ff5a3c', '#d5008f'];
      const rB = boxS / 2;
      const floorY = glassY + glassH - 2; // bilele stau pe fundul sticlei, nu peste rama
      const jit = k => { const s = Math.sin(k * 12.9898) * 43758.5453; return s - Math.floor(s); };
      // bile mari, gramada plina; latimi relative la sticla ca sa nu iasa din vitrina
      const wMax = glassW - boxS * 1.6 - 14;
      const rowsDef = [
        { n: 13, w: wMax,        r: rB * 1.32, up: 0.00, d: 0 },
        { n: 11, w: wMax * 0.86, r: rB * 1.26, up: 0.90, d: 1 },
        { n: 8,  w: wMax * 0.62, r: rB * 1.22, up: 1.78, d: 2 },
        { n: 5,  w: wMax * 0.40, r: rB * 1.18, up: 2.62, d: 3 },
        { n: 3,  w: wMax * 0.22, r: rB * 1.15, up: 3.44, d: 3 },
      ];
      const backRow = [], frontRow = [];
      rowsDef.forEach((row, ri) => {
        const y = floorY - row.up * boxS * 0.6 - row.r;
        for (let i = 0; i < row.n; i++) {
          const fx = row.n === 1 ? 0 : (i / (row.n - 1) - 0.5);
          const x = ccx + fx * row.w + jit(ri * 7 + i + 1) * 12 - 6;
          const col = shade(PAL2[(ri * 3 + i * 2) % PAL2.length], -row.d * 14);
          (row.d <= 1 ? frontRow : backRow).push({
            x, y: y + jit(ri + i * 3 + 2) * 7 - 3.5,
            r: row.r * (0.9 + jit(ri * 5 + i * 11 + 3) * 0.2),
            col });
        }
      });
      // bila-tinta pe crestet + doua bile din fata care o flancheaza (acopera gheara)
      const targetX = ccx, targetY = floorY - 4.35 * boxS * 0.6 - rB;
      const crownFront = [
        { x: ccx - boxS * 0.72, y: targetY + boxS * 0.36, r: rB * 1.30, col: PAL2[2] },
        { x: ccx + boxS * 0.72, y: targetY + boxS * 0.32, r: rB * 1.34, col: PAL2[5] },
      ];
      const drawPile = arr => { for (const c of arr) drawCrateBox(c.x, c.y, c.r * 2, c.col, 0); };

      const grabY = targetY - boxS * 0.5;     // gheara intra in gramada pana la tinta
      const displayY = Math.min(topY + 66, grabY - 26); // sus, cu bila in gheara (cadrul 5)
      const pedY = floorY - rB - 8;           // bila prezentata pe piedestal (cadrul 6)

      // cei 6 timpi din mockup: idle -> coboara -> prinde -> ridica -> sus -> piedestal
      let clawY, closed = 0, by = null, glow = 0, openAmt = 0, pileA = 1, pedA = 0, wobble = 0;
      if (t < 0.35) {                         // 1: gheara sta sus, gramada plina
        clawY = topY;
      } else if (t < 1.1) {                   // 2: coboara in morman
        clawY = lerp(topY, grabY, easeIO((t - 0.35) / 0.75));
      } else if (t < 1.5) {                   // 3: strange degetele pe bila
        clawY = grabY; closed = (t - 1.1) / 0.4;
      } else if (t < 2.45) {                  // 4-5: o ridica sus
        const f = easeIO((t - 1.5) / 0.95);
        clawY = lerp(grabY, displayY, f); closed = 1; by = clawY + boxS * 0.5 + 4;
      } else if (t < 2.95) {                  // 6a: ii da drumul, bila cade pe piedestal
        const f = (t - 2.45) / 0.5;
        clawY = displayY; closed = 1 - f;
        by = lerp(displayY + boxS * 0.5 + 4, pedY, f * f);
        pileA = Math.max(0, 1 - f * 2.5);     // gramada dispare repede, inainte sa aterizeze bila
        pedA = Math.min(1, f * 1.6);
      } else if (t < 4.15) {                  // 6b: suspans - bila tremura, glow-ul creste incet
        const ts = (t - 2.95) / 1.2;
        clawY = lerp(displayY, topY, Math.min(1, (t - 2.95) / 0.5));
        by = pedY; pileA = 0; pedA = 1;
        glow = ts * 0.55;
        wobble = Math.sin(t * 40) * 2.2 * ts;
      } else {                                // 6c: se deschide incet, cu raze
        const ts = (t - 4.15) / 0.75;
        clawY = topY;
        by = pedY; pileA = 0; pedA = 1;
        glow = 0.55 + 0.45 * Math.min(1, ts);
        openAmt = easeIO(Math.min(1, ts));
      }
      const grabbed = t >= 1.5;               // dupa prindere, tinta e purtata (ramane gol pe crestet)

      // tot ce e in masina se decupeaza pe sticla: nimic nu iese din vitrina,
      // iar lantul ghearei porneste din tavanul vitrinei (nu peste titlu) - fix telefon
      ctx.save();
      roundRect(glassX, glassY, glassW, glassH, 12); ctx.clip();

      // desen cu ordine pe adancime: fata acopera gheara cat e in morman
      if (pileA > 0.01) {
        ctx.globalAlpha = pileA;
        drawPile(backRow);
        if (!grabbed) {
          drawCrateBox(targetX, targetY, boxS, crateResult.capCol, 0);
          ctx.globalAlpha = 1;
          drawClaw(ccx, clawY, closed);
          ctx.globalAlpha = pileA;
          drawPile(frontRow);
          drawPile(crownFront);
        } else {
          drawPile(frontRow);
          drawPile(crownFront);
          ctx.globalAlpha = 1;
          if (pedA > 0) drawPedestal(ccx, pedY + rB + 5, pedA);
          if (by !== null) drawCrateBox(ccx, by, boxS + 2, crateResult.capCol, glow, openAmt);
          drawClaw(ccx, clawY, closed);
        }
        ctx.globalAlpha = 1;
      } else {
        drawPedestal(ccx, pedY + rB + 5, 1);
        if (glow > 0.12) drawSparks(ccx + wobble, by, Math.min(1, glow));
        drawCrateBox(ccx + wobble, by, boxS + 2, crateResult.capCol, glow, openAmt);
        drawClaw(ccx, clawY, closed);
      }
      ctx.restore(); // inchide decuparea pe sticla

      // panoul cu sanse: in dreapta masinii (centrat vertical pe ea); sub, doar daca nu incape
      if (sideRoom >= 150) drawChancePanel(ccx + 198, Math.max(28, 24 + pitY / 2 - 48));
      else drawChancePanel(ccx - 125, pitY + 32);

    } else {
      // ---- 9-12: explozie + card de reveal ----
      const cx = W / 2, cy = H / 2;
      const rt = t - CRATE_T;

      // raze rotative
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(tNow * 0.6);
      ctx.globalAlpha = 0.12 * Math.min(1, rt / 0.3);
      ctx.fillStyle = rar.color;
      for (let i = 0; i < 8; i++) {
        ctx.rotate(Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(340, -36); ctx.lineTo(340, 36);
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();
      ctx.globalAlpha = 1;

      // cardul de confirmare
      const cardW = 230, cardH = Math.min(250, H - 90);
      const popIn = Math.min(1, rt / 0.3);
      const scl = 0.6 + 0.4 * easeIO(popIn);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scl, scl);
      ctx.fillStyle = 'rgba(12,10,34,0.94)';
      roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 20); ctx.fill();
      ctx.shadowBlur = 18; ctx.shadowColor = rar.color;
      ctx.strokeStyle = rar.color; ctx.lineWidth = 3;
      roundRect(-cardW / 2, -cardH / 2, cardW, cardH, 20); ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.textAlign = 'center';
      neonText(crateResult.dupe ? 'DUPLICATE' : 'NEW SKIN!', 0, -cardH / 2 + 32, 17, crateResult.dupe ? '#ffd700' : '#00ff9d');

      const bob2 = Math.sin(tNow * 3) * 5;
      ctx.save();
      ctx.translate(0, -14 + bob2);
      drawCharCentered(ch, 80, 1);
      ctx.restore();

      ctx.font = 'bold 19px Courier New';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(ch.name, 0, cardH / 2 - 62);
      ctx.font = 'bold 13px Courier New';
      ctx.fillStyle = rar.color;
      ctx.fillText(rar.name, 0, cardH / 2 - 42);
      ctx.font = '11px Courier New';
      if (crateResult.dupe) {
        ctx.fillStyle = '#ffd700';
        ctx.fillText('refund +' + crateResult.refund + ' \u{1F7E1}', 0, cardH / 2 - 20);
      } else {
        ctx.fillStyle = '#00ff9d';
        ctx.fillText('equipped automatically', 0, cardH / 2 - 20);
      }
      ctx.restore();

      // particulele exploziei (peste card)
      if (crateParts) {
        for (const pp of crateParts) {
          ctx.globalAlpha = Math.max(0, pp.life / pp.max);
          ctx.fillStyle = pp.col;
